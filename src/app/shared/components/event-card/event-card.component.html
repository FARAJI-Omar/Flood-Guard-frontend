<div
  class="bg-white rounded-lg shadow-sm mb-4 cursor-pointer overflow-hidden transition-all duration-300 relative group"
  [class.ring-2]="isSelected()"
  [class.ring-indigo-500]="isSelected()"
  (click)="onClick()"
>
  <!-- Severity Sidebar -->
  <div
    class="absolute left-0 top-0 bottom-0 w-2"
    [ngClass]="getSeverityBgClass(event().properties.severity)"
  ></div>

  <div class="p-5 pl-7 border border-slate-100 rounded-lg group-hover:shadow-md transition-shadow">
    <div class="flex justify-between items-start mb-1">
      <h3 class="text-[1.1rem] font-bold text-slate-800">{{ event().properties.name }}</h3>
      <div class="flex items-center gap-2">
        <span
          class="px-2 py-1 text-[0.65rem] font-bold rounded tracking-wider uppercase"
          [ngClass]="getSeverityBadgeClass(event().properties.severity)"
        >
          {{ event().properties.severity }}
        </span>
      </div>
    </div>

    <div class="text-[0.8rem] text-slate-500 mb-6 font-medium">
      {{ event().properties.eventDate | date: 'MMMM d, yyyy \u2022 hh:mm a' }}
    </div>

    <div class="flex items-end justify-between">
      <div class="flex flex-col">
        <span class="text-slate-400 text-[0.65rem] font-bold tracking-wider mb-1"
          >AFFECTED AREA</span
        >
        <span class="font-bold text-slate-800">{{ event().properties.areaKm2 }} km²</span>
      </div>

      <div class="flex items-center bg-slate-100 rounded-md p-1 opacity-100 transition-opacity">
        <button
          *appAdminOnly
          (click)="onEdit(event().properties.id, $event)"
          class="text-blue-600 hover:bg-blue-200 p-1.5 rounded transition-colors cursor-pointer"
          title="Edit event"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"
            />
          </svg>
        </button>
        <button
          *appAdminOnly
          (click)="onDelete(event().properties.id, $event)"
          class="text-red-600 hover:bg-red-200 p-1.5 rounded transition-colors cursor-pointer"
          title="Delete event"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
