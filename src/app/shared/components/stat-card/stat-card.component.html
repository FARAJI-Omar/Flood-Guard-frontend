<div
  class="bg-gray-50 rounded-2xl shadow-sm border border-gray-50 p-4 flex flex-col relative overflow-hidden h-full"
>
  <!-- Left thick border accent -->
  <div class="absolute left-0 top-0 bottom-0 w-1.25" [ngClass]="leftBorderColor()"></div>

  <div class="flex justify-between items-start mb-2 pl-1">
    <!-- Icon Slot -->
    <div [ngClass]="iconColor()">
      <ng-content select="[icon]"></ng-content>
    </div>

    <!-- Extra Text / Badge -->
    <div class="text-sm font-semibold text-[#5c6780]">{{ label() }}</div>
  </div>

  <div class="pl-1">
    <div class="text-2xl font-bold tracking-tight mb-2 leading-none" [ngClass]="valueColor()">
      {{ value() }}
    </div>
  </div>
</div>
