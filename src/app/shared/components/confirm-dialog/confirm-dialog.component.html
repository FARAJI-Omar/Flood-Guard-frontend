@if (isOpen()) {
  <div class="fixed inset-0 bg-black/50 z-1000 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6" (click)="$event.stopPropagation()">
      <h3 class="text-lg font-bold text-slate-900 mb-2">{{ title() }}</h3>
      <p class="text-slate-600 mb-6">{{ message() }}</p>
      <div class="flex justify-end gap-3">
        <button 
          (click)="onCancel()" 
          class="px-4 py-2 rounded-md text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors">
          {{ cancelText() }}
        </button>
        <button 
          (click)="onConfirm()" 
          class="px-4 py-2 rounded-md text-sm font-medium text-white bg-red-600 hover:bg-red-700 transition-colors">
          {{ confirmText() }}
        </button>
      </div>
    </div>
  </div>
}
