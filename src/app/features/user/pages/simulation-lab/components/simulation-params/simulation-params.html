<div class="flex flex-col h-full bg-white md:bg-transparent">
  <div class="flex items-center gap-2 mb-6 md:mb-8 font-bold text-[#111827] text-lg">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="w-5 h-5"
    >
      <line x1="4" y1="21" x2="4" y2="14"></line>
      <line x1="4" y1="10" x2="4" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="12"></line>
      <line x1="12" y1="8" x2="12" y2="3"></line>
      <line x1="20" y1="21" x2="20" y2="16"></line>
      <line x1="20" y1="12" x2="20" y2="3"></line>
      <line x1="2" y1="14" x2="6" y2="14"></line>
      <line x1="10" y1="8" x2="14" y2="8"></line>
      <line x1="18" y1="16" x2="22" y2="16"></line>
    </svg>

    SIMULATION PARAMETERS
  </div>

  <div class="flex flex-col gap-4 flex-1">
    <!-- Rainfall Intensity -->
    <div class="bg-[#F0F4FA] rounded-xl p-4">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2 block"
        >Rainfall Intensity</label
      >
      <div class="flex items-center bg-white rounded-lg px-3 py-2 border border-gray-100">
        <input
          type="number"
          class="w-full outline-none text-xl font-bold bg-transparent text-[#1F2937]"
          [ngModel]="params().rainfallIntensity"
          (ngModelChange)="onUpdateParam('rainfallIntensity', $event)"
        />
        <span class="text-sm text-gray-400 font-medium whitespace-nowrap">mm/24h</span>
      </div>
    </div>

    <!-- Hydrologic Soil Type -->
    <div class="bg-[#F0F4FA] rounded-xl p-4">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3 block"
        >Hydrologic Soil Type</label
      >
      <div class="grid grid-cols-4 gap-2 mb-3">
        @for (type of soilTypes; track type.id) {
          <button
            (click)="onUpdateParam('hydrologicSoilType', type.id)"
            [class.bg-white]="params().hydrologicSoilType === type.id"
            [class.shadow-sm]="params().hydrologicSoilType === type.id"
            [class.text-[#1F2937]]="params().hydrologicSoilType === type.id"
            [class.text-gray-400]="params().hydrologicSoilType !== type.id"
            class="flex flex-col items-center justify-center py-2 rounded-lg font-bold transition-all hover:bg-white/50"
          >
            <span class="text-xs mb-1">
              @if (type.id === 'A') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="w-5 h-5"
                >
                  <circle cx="12" cy="12" r="2" />
                  <circle cx="19" cy="12" r="2" />
                  <circle cx="5" cy="12" r="2" />
                  <circle cx="12" cy="19" r="2" />
                  <circle cx="12" cy="5" r="2" />
                  <circle cx="17" cy="17" r="2" />
                  <circle cx="7" cy="7" r="2" />
                </svg>
              }
              @if (type.id === 'B') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-5 h-5"
                >
                  <rect width="18" height="18" x="3" y="3" rx="2" />
                  <path d="m7 7 10 10" />
                  <path d="m11 7 6 6" />
                  <path d="m7 11 6 6" />
                </svg>
              }
              @if (type.id === 'C') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-5 h-5"
                >
                  <path d="m8 3 4 8 5-5 5 15H2L8 3z" />
                </svg>
              }
              @if (type.id === 'D') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-5 h-5"
                >
                  <polygon points="12 2 2 7 12 12 22 7 12 2" />
                  <polyline points="2 17 12 22 22 17" />
                  <polyline points="2 12 12 17 22 12" />
                </svg>
              }
            </span>
            {{ type.name }}
          </button>
        }
      </div>
      <div class="bg-white rounded-lg p-3 text-xs text-gray-500 leading-relaxed min-h-[80px]">
        {{ currentSoilDescription }}
      </div>
    </div>

    <!-- Land Cover Usage -->
    <div class="bg-[#F0F4FA] rounded-xl p-4">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3 block"
        >Land Cover Usage</label
      >
      <div class="flex flex-col gap-2">
        @for (cover of landCovers; track cover.id) {
          <label
            class="flex items-center gap-3 bg-white px-3 py-2.5 rounded-lg cursor-pointer border border-transparent hover:border-gray-200 transition-colors"
          >
            <input
              type="radio"
              name="landCover"
              [value]="cover.id"
              [ngModel]="params().landCoverUsage"
              (ngModelChange)="onUpdateParam('landCoverUsage', $event)"
              class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300"
            />
            <span class="text-sm font-semibold text-gray-700 flex-1">{{ cover.name }}</span>
          </label>
        }
      </div>
    </div>

    <!-- Boundary Selection -->
    <div class="bg-[#F0F4FA] rounded-xl p-4">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3 block"
        >Boundary Selection</label
      >
      <button
        (click)="onToggleDraw()"
        [class.bg-green-50]="params().polygon"
        [class.text-green-700]="params().polygon"
        [class.border-green-500]="params().polygon"
        [class.shadow-[0_0_0_2px_rgba(34,197,94,0.2)]]="params().polygon"
        [class.bg-[#E2E8F0]]="!params().polygon && !isDrawingMode"
        [class.text-gray-700]="!params().polygon && !isDrawingMode"
        [class.border-red-400]="!params().polygon && !isDrawingMode"
        [class.shadow-[0_0_0_2px_rgba(248,113,113,0.2)]]="!params().polygon && !isDrawingMode"
        [class.bg-blue-50]="isDrawingMode && !params().polygon"
        [class.text-blue-700]="isDrawingMode && !params().polygon"
        [class.border-blue-500]="isDrawingMode && !params().polygon"
        class="w-full flex items-center justify-center gap-2 py-3 rounded-lg font-bold border transition-all mb-2"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        {{ isDrawingMode ? 'Drawing...' : params().polygon ? 'Polygon Drawn' : 'Draw Polygon' }}
      </button>
      @if (params().polygon) {
        <div class="flex items-center gap-1.5 text-green-600 text-xs font-semibold mt-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          Ready for simulation
        </div>
      }
      @if (!params().polygon) {
        <div class="flex items-center gap-1.5 text-red-500 text-xs font-semibold mt-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Polygon required
        </div>
      }
    </div>
  </div>

  <div class="mt-6 flex flex-col gap-3">
    <button
      (click)="runSimulation()"
      [disabled]="!params().rainfallIntensity || !params().polygon || isRunning()"
      [class.opacity-50]="!params().rainfallIntensity || !params().polygon || isRunning()"
      [class.cursor-not-allowed]="!params().rainfallIntensity || !params().polygon || isRunning()"
      class="w-full bg-[#0F172A] hover:bg-black text-white font-bold py-3.5 rounded-lg transition-colors shadow-lg flex justify-center items-center gap-2"
    >
      @if (isRunning()) {
        <span
          class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"
        ></span>
      }
      RUN SIMULATION
    </button>
    <button
      (click)="onClearAll()"
      class="w-full bg-[#E2E8F0] hover:bg-gray-300 text-[#1F2937] font-bold py-3 rounded-lg transition-colors"
    >
      Clear All Parameters
    </button>
  </div>
</div>
