<div class="min-h-screen flex flex-col bg-white">
  <!-- Header -->
  <header class="w-full bg-white flex items-center justify-between px-10 py-3 z-10000">
    <!-- Logo -->
    <div class="flex items-center gap-2.5 px-1.5 pb-2.5 pt-1">
      <img src="logo.png" alt="Flood Guard" class="h-12 w-12 object-contain" />
      <span
        class="whitespace-nowrap text-xl font-bold tracking-1 text-[#1f3167] transition-opacity duration-500"
      >
        Flood Guard
      </span>
    </div>

    <!-- Navigation -->
    <nav class="flex items-center gap-8 text-sm font-medium text-slate-500">
      <a
        routerLink="/user/dashboard"
        routerLinkActive="text-blue-950 font-semibold pb-1 border-b-2 border-blue-950"
        class="hover:text-slate-950"
        >Dashboard</a
      >
      <a
        routerLink="/user/simulationlab"
        routerLinkActive="text-blue-950 font-semibold pb-1 border-b-2 border-blue-950"
        class="hover:text-slate-950"
        >Simulation Lab</a
      >
      <a
        routerLink="/user/history"
        routerLinkActive="text-blue-950 font-semibold pb-1 border-b-2 border-blue-950"
        class="hover:text-slate-950"
        >Flood History</a
      >
      <!-- <a
        routerLink="/user/reports"
        routerLinkActive="text-blue-950 font-semibold pb-1 border-b-2 border-blue-950"
        class="hover:text-slate-950"
        >My Reports</a
      > -->
      <!-- <a
        routerLink="/user/alerts"
        routerLinkActive="text-blue-950 font-semibold pb-1 border-b-2 border-blue-950"
        class="hover:text-slate-950"
        >Alerts</a
      > -->
    </nav>

    <!-- User Profile & Notifications -->
    <div class="flex items-center gap-4">
      <button class="text-slate-400 hover:text-slate-600 relative">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
          />
        </svg>
        <span
          class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"
        ></span>
      </button>

      <div class="flex items-center gap-3 border-l pl-6 relative ">
        <span class="text-sm font-semibold text-slate-700">{{ (username$ | async) || 'user' }}</span>
        <div
          (click)="toggleDropdown()"
          class="w-10 h-10 rounded-lg overflow-hidden  cursor-pointer"
        >
              <!-- Avatar -->
        <div
          class="h-10 w-10 flex items-center justify-center rounded-xl border-2 border-[#1E3A8A] bg-blue-100 overflow-hidden"
        >
          <svg fill="currentColor" viewBox="0 0 24 24" class="w-8 h-8 text-blue-950 mt-3 opacity-80">
            <path
              d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
        </div>
        </div>

        <!-- Dropdown Menu -->
         @if (dropdownOpen) {    
             <div
               class="absolute right-0 top-12 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-20 border border-slate-200"
             >
               <a routerLink="/user/profile" (click)="toggleDropdown()" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 cursor-pointer">Settings</a>
               <button (click)="lougout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-slate-100">Logout</button>
             </div>
         }
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="grow px-12">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="w-full bg-blue-50 px-8 py-6 mt-20">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
      <div class="mb-4 md:mb-0">
        <h3 class="text-lg font-bold text-slate-900 mb-1">Flood Guard MA</h3>
        <p class="text-xs text-slate-500 tracking-wider">
          © 2026 FLOODGUARD MA. PRECISION & PROTECTION.
        </p>
      </div>

      <div class="flex gap-8 text-xs font-semibold text-slate-500 tracking-wider">
        <a href="#" class="hover:text-slate-900 transition-colors">SUPPORT</a>
        <a href="#" class="hover:text-slate-900 transition-colors">PRIVACY POLICY</a>
        <a href="#" class="hover:text-slate-900 transition-colors">TERMS OF SERVICE</a>
        <a href="#" class="hover:text-slate-900 transition-colors">CONTACT</a>
      </div>
    </div>
  </footer>
</div>
