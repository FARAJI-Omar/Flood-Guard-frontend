<section class="flex min-h-screen">
  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-50 flex shrink-0 flex-col gap-2.5 bg-[#F1F5F9] px-3 pb-5 pt-4 border-r border-blue-200 transition-[width] duration-200 ease-in-out"
    [class.w-56]="!isSidebarCollapsed()"
    [class.w-20]="isSidebarCollapsed()"
  >
    <button
      type="button"
      (click)="toggleSidebar()"
      aria-label="Toggle sidebar"
      class="absolute -right-3.5 top-4.5 grid h-7 w-7 place-items-center rounded-full border-0 bg-blue-200 cursor-pointer hover:bg-blue-500 text-white"
    >
      @if (isSidebarCollapsed()) {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
          class="h-4 w-4"
        >
          <path d="M9 18l6-6-6-6" />
        </svg>
      } @else {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
          class="h-4 w-4"
        >
          <path d="M15 18l-6-6 6-6" />
        </svg>
      }
    </button>

    <div class="flex items-center gap-2.5 px-1.5 pb-2.5 pt-1">
      <img src="logo.png" alt="Flood Guard" class="h-12 w-12 object-contain" />
      <span
        class="whitespace-nowrap text-xl font-bold tracking-1 text-[#1f3167] transition-opacity duration-500"
        [class.hidden]="isSidebarCollapsed()"
      >
        Flood Guard
      </span>
    </div>

    <nav aria-label="Admin" class="flex flex-col gap-1.5 pt-6">
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="text-white"
        #dashboardRla="routerLinkActive"
        [class.bg-[#1E3A8A]]="dashboardRla.isActive"
        [class.text-white]="dashboardRla.isActive"
        class="flex h-10 w-full items-center gap-3 rounded-sm border-0 px-2.5 text-gray-600 cursor-pointer"
      >
        <svg
          class="h-4 w-4 shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="4" />
          <rect x="14" y="10" width="7" height="11" />
          <rect x="3" y="13" width="7" height="8" />
        </svg>
        <span
          class="whitespace-nowrap font-medium transition-opacity duration-100"
          [class.opacity-0]="isSidebarCollapsed()"
          [class.w-0]="isSidebarCollapsed()"
          [class.overflow-hidden]="isSidebarCollapsed()"
        >
          Dashboard
        </span>
      </a>

          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"

          <path d="M12 2l10 18H2L12 2z" />

    <button
      (click)="lougout()"
      type="button"
      class="mt-3.5 flex h-10 w-full items-center gap-3 rounded-sm border-0 bg-transparent px-2.5 text-red-500 cursor-pointer"
    >
      <svg
        class="h-4 w-4 shrink-0"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <path d="M16 17l5-5-5-5" />
        <path d="M21 12H9" />
      </svg>
      <span
        class="whitespace-nowrap font-medium transition-opacity duration-100"
        [class.opacity-0]="isSidebarCollapsed()"
        [class.w-0]="isSidebarCollapsed()"
        [class.overflow-hidden]="isSidebarCollapsed()"
      >
        Log Out
      </span>
    </button>

  <!-- Main Content -->
  <main
    class="min-h-screen flex-1 bg-white transition-[margin-left] duration-200 ease-in-out"
    [class.ml-56]="!isSidebarCollapsed()"
    [class.ml-20]="isSidebarCollapsed()"
  >
    <!-- Header Section -->
    <header class="flex items-center justify-end gap-6 mb-1 p-8 pb-0">
      <!-- Notification Bell -->
      <button class="relative text-[#5c6780] hover:text-[#1E3A8A] transition-colors">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
          />
        </svg>
        <!-- Red Dot -->
        <span
          class="absolute top-0 right-0.5 block h-1.5 w-1.5 rounded-full bg-red-600 ring-2 ring-[#F8FAFC]"
        ></span>
      </button>

      <!-- Divider -->
      <div class="h-8 w-px bg-gray-200"></div>

      <!-- User Profile -->
      <div class="flex items-center gap-3 cursor-pointer group">
        <div class="flex flex-col text-right">
          <span class="text-sm font-bold text-[#1E3A8A]">{{ (username$ | async) || 'Admin' }}</span>
          <span class="text-xs font-medium text-[#5c6780]">System Controller</span>
        </div>
        <!-- Avatar -->
        <div
          class="h-10 w-10 flex items-center justify-center rounded-xl border-2 border-[#1E3A8A] bg-blue-100 overflow-hidden"
        >
          <svg fill="currentColor" viewBox="0 0 24 24" class="w-8 h-8 text-blue-950 mt-3 opacity-80">
            <path
              d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
        </div>
      </div>
    </header>

    <router-outlet></router-outlet>
  </main>
</section>
